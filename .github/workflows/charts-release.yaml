name: "Charts: Release"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  charts-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git diff

      - name: Set BASE_SHA
        id: base_sha
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          else
            echo "BASE_SHA=$(git merge-base origin/main HEAD)" >> $GITHUB_OUTPUT
            echo "Not PR, BASE_SHA is $(git merge-base origin/main HEAD)"
          fi

      - name: Install helm-docs
        run: |
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar xz
          sudo mv helm-docs /usr/local/bin/

      - name: Regenerate READMEs for changed charts
        run: |
          echo "🔍 Detecting changed chart paths..."
          CHARTS=()
          PATHS=($(git diff --name-only ${{ steps.base_sha.outputs.BASE_SHA }} HEAD))
          echo "git diff is:"
          git diff --name-only ${{ steps.base_sha.outputs.BASE_SHA }} HEAD
          echo "Paths are: ${PATHS}"

          for i in "${PATHS[@]}"
          do
              if [[ "$i" != charts/* ]]; then
                  continue
              fi

              IFS='/' read -r -a path_parts <<< "$i"
              if [[ ${#path_parts[@]} -lt 3 ]]; then
                  continue
              fi

              CHART_PATH="${path_parts[1]}/${path_parts[2]}"
              CHARTS+=("$CHART_PATH")
          done

          # Remove duplicates
          CHARTS=( $(printf "%s\n" "${CHARTS[@]}" | sort -u) )

          echo "📦 Changed charts:"
          for i in "${CHARTS[@]}"; do
            echo " - $i"
          done

          for i in "${CHARTS[@]}"
          do
              IFS='/' read -r -a chart_parts <<< "$i"
              CATEGORY="${chart_parts[0]}"
              NAME="${chart_parts[1]}"
              CHART_DIR="charts/${CATEGORY}/${NAME}"

              if [ -f "${CHART_DIR}/Chart.yaml" ]; then
                echo "📄 Generating docs for chart: ${CATEGORY}/${NAME}"
                ./hack/gen-helm-docs.sh "${CATEGORY}" "${NAME}"
              else
                echo "❌ Chart.yaml not found for ${CATEGORY}/${NAME}, skipping."
              fi
          done

      - name: Commit and push README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto-generate chart README [no ci]
          file_pattern: charts/**/README.md
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com

      - name: Configure Git identity
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Set up chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts/*
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

