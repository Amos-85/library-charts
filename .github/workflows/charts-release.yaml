name: "Charts: Release"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  charts-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # for pushing README changes and releases
      id-token: write  # required for OIDC (used by some actions)
      packages: write  # in case OCI registry is used in future

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git diff & tags

      - name: Set BASE_SHA
        id: base_sha
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "BASE_SHA=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
          else
            echo "BASE_SHA=$(git rev-parse HEAD^)" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed charts
        id: changed_charts
        run: |
          CHARTS=$(git diff --name-only ${{ steps.base_sha.outputs.BASE_SHA }} HEAD | grep '^charts/' | awk -F/ '{print $1"/"$2"/"$3}' | sort -u || true)
          echo "CHARTS=$CHARTS" >> $GITHUB_ENV
          echo "Changed charts: $CHARTS"

      - name: Install helm-docs
        run: |
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.11.0/helm-docs_1.11.0_Linux_x86_64.tar.gz | tar xz
          sudo mv helm-docs /usr/local/bin/

      - name: Regenerate chart READMEs
        run: |
          for chart in $CHARTS; do
            echo "Generating docs for chart $chart"
            if [ -f "$chart/Chart.yaml" ]; then
              ./hack/gen-helm-docs.sh "$(dirname "$chart")" "$(basename "$chart")"
            fi
          done

      - name: Commit and push README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Auto-generate chart README [no ci]
          file_pattern: charts/**/README.md
          commit_user_name: github-actions
          commit_user_email: github-actions@github.com

      - name: Set up chart-releaser
        uses: helm/chart-releaser-action@v1.5.0
        with:
          charts_dir: charts
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

